<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha — Jaque Música</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/auth.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
<div class="auth-card">
  <div class="auth-brand">
    <div class="brand-mark">J</div>
    <h1>Definir nova senha</h1>
    <p>Escolha a nova senha da sua conta.</p>
  </div>

  <div id="reset-msg" class="auth-msg"></div>

  <form id="form-reset">
    <div class="field"><label>Nova senha</label><input type="password" id="reset-password" required minlength="6" autocomplete="new-password"></div>
    <div class="field"><label>Confirmar nova senha</label><input type="password" id="reset-password-confirm" required minlength="6" autocomplete="new-password"></div>
    <button type="submit" class="btn btn-primary auth-submit">Salvar nova senha</button>
  </form>

  <div class="auth-foot"><a data-action="go-login">Voltar para o login</a></div>
</div>

<script type="module" src="reset-password.js"></script>
</body>
</html>
